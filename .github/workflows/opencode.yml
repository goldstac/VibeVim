name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode-with-approval:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    
    # We need 'write' permissions so it can create the approval issue AND push code
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # 🛑 STEP 1: The Pause & Ask for Permission
      - name: Ask for Permission
        uses: trstringer/manual-approval@v1
        timeout-minutes: 60
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: goldstac  # ⚠️ CHANGE THIS TO YOUR EXACT GITHUB USERNAME
          minimum-approvals: 1
          issue-title: "Approval required for OpenCode"
          issue-body: "OpenCode was triggered. Please reply to this issue with `approve` or `yes` to allow it to run."

      # 🚀 STEP 2: Run OpenCode (Only happens if Step 1 is approved)
      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
